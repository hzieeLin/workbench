appId: com.taskflow.app
productName: TaskFlow
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - dist-server/**/*
  - package.json
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.map"
win:
  target: nsis
  icon: build/icon.ico
mac:
  target: dmg
  icon: build/icon.icns
linux:
  target: AppImage
  icon: build/icon.png
